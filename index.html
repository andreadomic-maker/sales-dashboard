<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sales Activations Dashboard</title>
<style>
  :root{
    --bg: #0b0e14;
    --panel: #131722;
    --panel-2: #161b29;
    --line: #232a3b;
    --text: #e7eaf2;
    --muted: #8893a8;
    --accent: #6ee7d6;
    --accent2: #f5a55a;
    --accent3: #c084fc;
    --red: #f06868;
    --mono: 'IBM Plex Mono','SFMono-Regular',Consolas,monospace;
    --sans: 'Inter','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:
      radial-gradient(1200px 600px at 80% -10%, rgba(110,231,214,0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(192,132,252,0.06), transparent 60%),
      var(--bg);
    color:var(--text); font-family:var(--sans); min-height:100vh;
  }
  header{
    padding:28px 36px 18px; border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:14px;
  }
  header h1{ margin:0; font-size:22px; font-weight:700; letter-spacing:-0.01em; }
  header .eyebrow{
    font-family:var(--mono); font-size:11px; letter-spacing:0.12em; color:var(--accent);
    text-transform:uppercase; margin-bottom:6px;
  }
  header p{margin:4px 0 0; color:var(--muted); font-size:13px;}
  .kpis{display:flex; gap:10px; flex-wrap:wrap;}
  .kpi{ background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 16px; min-width:120px; }
  .kpi .label{font-family:var(--mono); font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em;}
  .kpi .value{font-size:20px; font-weight:700; margin-top:3px;}
  .kpi .value.accent{color:var(--accent);}
  .kpi .value.warn{color:var(--accent2);}

  nav{ display:flex; gap:4px; padding:14px 36px 0; border-bottom:1px solid var(--line); overflow-x:auto; }
  nav button{
    background:transparent; border:none; color:var(--muted); font-family:var(--sans);
    font-size:13.5px; font-weight:600; padding:10px 16px; cursor:pointer;
    border-bottom:2px solid transparent; white-space:nowrap; transition:color .15s, border-color .15s;
  }
  nav button:hover{color:var(--text);}
  nav button.active{color:var(--accent); border-bottom-color:var(--accent);}

  main{padding:28px 36px 60px;}
  .tabpanel{display:none;}
  .tabpanel.active{display:block;}

  .grid{display:grid; gap:18px;}
  .grid.cols-2{grid-template-columns:1.4fr 1fr;}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  @media(max-width:980px){ .grid.cols-2, .grid.cols-3{grid-template-columns:1fr;} }

  .card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px; }
  .card h3{margin:0 0 2px; font-size:14px; font-weight:700;}
  .card .sub{font-size:11.5px; color:var(--muted); margin-bottom:14px;}
  .card.note{
    background:linear-gradient(135deg, rgba(110,231,214,0.08), rgba(192,132,252,0.05));
    border-color:rgba(110,231,214,0.25);
  }
  .card.note p{font-size:13px; line-height:1.6; color:var(--text); margin:0;}
  .card.note strong{color:var(--accent);}

  svg{width:100%; display:block; overflow:visible;}
  svg text{fill:var(--muted); font-family:var(--sans);}
  .axis-line{stroke:#1c2233; stroke-width:1;}
  .grid-line{stroke:#1c2233; stroke-width:1;}

  .chip-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;}
  .chip{
    font-family:var(--mono); font-size:11px; padding:5px 10px; border-radius:999px;
    border:1px solid var(--line); color:var(--muted); cursor:pointer; user-select:none;
  }
  .chip.active{ color:var(--bg); font-weight:700; }

  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:11px; color:var(--muted);}
  .legend span{display:inline-flex; align-items:center; gap:6px;}
  .legend i{width:10px; height:10px; border-radius:3px; display:inline-block;}

  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  th, td{padding:7px 8px; text-align:right; border-bottom:1px solid var(--line);}
  th:first-child, td:first-child{text-align:left; color:var(--muted);}
  thead th{color:var(--muted); font-weight:600; font-family:var(--mono); font-size:10.5px; text-transform:uppercase;}
  tbody tr:hover{background:var(--panel-2);}
  td.total{font-weight:700; color:var(--accent);}

  .cat-select{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .cat-btn{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    padding:9px 14px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .cat-btn.active{ border-color:var(--accent); color:var(--accent); background:rgba(110,231,214,0.07);}

  .tooltip{
    position:fixed; pointer-events:none; background:#0f1320; border:1px solid var(--line);
    border-radius:8px; padding:8px 10px; font-size:11.5px; font-family:var(--mono);
    color:var(--text); z-index:50; display:none; box-shadow:0 8px 24px rgba(0,0,0,0.5);
  }

  footer{padding:20px 36px; color:var(--muted); font-size:11px; border-top:1px solid var(--line); font-family:var(--mono);}
</style>
</head>

// ============ SVG CHART PRIMITIVES ============
const NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs){
  const el = document.createElementNS(NS, tag);
  for(const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function lineChart(container, labels, series, opts={}){
  const W = opts.width || 1000, H = opts.height || 280;
  const padL = 46, padR = 14, padT = 14, padB = 56;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const allVals = series.flatMap(s=>s.data);
  const maxV = Math.max(1, ...allVals) * 1.12;
  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`, preserveAspectRatio:'none'});
  const n = labels.length;
  const xStep = innerW / (n-1);
  const yScale = v => padT + innerH - (v/maxV)*innerH;
  const xScale = i => padL + i*xStep;

  const gridN = 4;
  for(let i=0;i<=gridN;i++){
    const y = padT + innerH - (i/gridN)*innerH;
    svg.appendChild(svgEl('line', {x1:padL,y1:y,x2:W-padR,y2:y,class:'grid-line'}));
    const val = (maxV/gridN*i);
    const t = svgEl('text', {x:padL-8, y:y+4, 'text-anchor':'end', 'font-size':10});
    t.textContent = fmt(val);
    svg.appendChild(t);
  }
  labels.forEach((l,i)=>{
    if(n>14 && i%2!==0) return;
    const t = svgEl('text', {x:xScale(i), y:H-30, 'text-anchor':'end', 'font-size':9, transform:`rotate(-55 ${xScale(i)} ${H-30})`});
    t.textContent = l;
    svg.appendChild(t);
  });

  series.forEach(s=>{
    let path = '';
    s.data.forEach((v,i)=>{
      path += (i===0?'M':'L') + xScale(i) + ' ' + yScale(v) + ' ';
    });
    if(s.fill){
      let area = path + `L ${xScale(n-1)} ${yScale(0)} L ${xScale(0)} ${yScale(0)} Z`;
      svg.appendChild(svgEl('path', {d:area, fill:s.color, 'fill-opacity':0.12, stroke:'none'}));
    }
    svg.appendChild(svgEl('path', {d:path, fill:'none', stroke:s.color, 'stroke-width':2, 'stroke-linejoin':'round'}));
    s.data.forEach((v,i)=>{
      const c = svgEl('circle', {cx:xScale(i), cy:yScale(v), r:3, fill:s.color, style:'cursor:pointer'});
      c.addEventListener('mousemove', (e)=>showTip(e, `<b>${labels[i]}</b><br>${s.label}: ${fmt(v)}`));
      c.addEventListener('mouseleave', hideTip);
      svg.appendChild(c);
    });
  });

  container.innerHTML='';
  container.appendChild(svg);
  if(series.length>1) addLegend(container, series.map(s=>({label:s.label,color:s.color})));
}

function barChartV(container, labels, series, opts={}){
  const W = opts.width || 1000, H = opts.height || 280;
  const padL = 46, padR = 14, padT = 14, padB = 56;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const stacked = opts.stacked;
  const n = labels.length;
  let maxV;
  if(stacked){
    maxV = Math.max(...labels.map((_,i)=>series.reduce((s,ser)=>s+ser.data[i],0))) * 1.1;
  } else {
    maxV = Math.max(...series.flatMap(s=>s.data)) * 1.1;
  }
  maxV = Math.max(maxV, 1);
  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`, preserveAspectRatio:'none'});
  const yScale = v => padT + innerH - (v/maxV)*innerH;
  const groupW = innerW/n;
  const barW = stacked ? groupW*0.62 : (groupW*0.7)/series.length;

  const gridN = 4;
  for(let i=0;i<=gridN;i++){
    const y = padT + innerH - (i/gridN)*innerH;
    svg.appendChild(svgEl('line', {x1:padL,y1:y,x2:W-padR,y2:y,class:'grid-line'}));
    const t = svgEl('text', {x:padL-8, y:y+4, 'text-anchor':'end', 'font-size':10});
    t.textContent = fmt(maxV/gridN*i);
    svg.appendChild(t);
  }
  labels.forEach((l,i)=>{
    if(n>14 && i%2!==0) return;
    const cx = padL + i*groupW + groupW/2;
    const t = svgEl('text', {x:cx, y:H-30, 'text-anchor':'end', 'font-size':9, transform:`rotate(-55 ${cx} ${H-30})`});
    t.textContent = l;
    svg.appendChild(t);
  });

  labels.forEach((l,i)=>{
    let yCursor = 0;
    series.forEach((s,si)=>{
      const v = s.data[i];
      let x, w;
      if(stacked){
        x = padL + i*groupW + (groupW-barW)/2;
        w = barW;
        const y0 = yScale(yCursor), y1 = yScale(yCursor+v);
        const rect = svgEl('rect', {x, y:y1, width:w, height:Math.max(0,y0-y1), fill:s.color, style:'cursor:pointer'});
        rect.addEventListener('mousemove', (e)=>showTip(e, `<b>${l}</b><br>${s.label}: ${fmt(v)}`));
        rect.addEventListener('mouseleave', hideTip);
        svg.appendChild(rect);
        yCursor += v;
      } else {
        x = padL + i*groupW + (groupW - series.length*barW)/2 + si*barW;
        w = barW*0.85;
        const y0 = yScale(0), y1 = yScale(v);
        const rect = svgEl('rect', {x, y:y1, width:w, height:Math.max(0,y0-y1), fill:s.color, style:'cursor:pointer'});
        rect.addEventListener('mousemove', (e)=>showTip(e, `<b>${l}</b><br>${s.label}: ${fmt(v)}`));
        rect.addEventListener('mouseleave', hideTip);
        svg.appendChild(rect);
      }
    });
  });

  container.innerHTML='';
  container.appendChild(svg);
  if(series.length>1) addLegend(container, series.map(s=>({label:s.label,color:s.color})));
}

function barChartH(container, items, opts={}){
  const W = opts.width || 1000;
  const rowH = 26;
  const padL = opts.padL || 150, padR = 60, padT = 8, padB = 8;
  const H = items.length*rowH + padT + padB;
  const innerW = W - padL - padR;
  const maxV = Math.max(...items.map(i=>i.value)) * 1.08 || 1;
  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`, preserveAspectRatio:'none'});
  items.forEach((it,i)=>{
    const y = padT + i*rowH;
    const w = (it.value/maxV)*innerW;
    const lbl = svgEl('text', {x:padL-8, y:y+rowH*0.65, 'text-anchor':'end', 'font-size':11});
    lbl.textContent = it.label;
    svg.appendChild(lbl);
    const rect = svgEl('rect', {x:padL, y:y+4, width:Math.max(2,w), height:rowH-10, rx:4, fill:it.color, style:'cursor:pointer'});
    rect.addEventListener('mousemove', (e)=>showTip(e, `<b>${it.label}</b><br>${fmt(it.value)}`));
    rect.addEventListener('mouseleave', hideTip);
    svg.appendChild(rect);
    const valTxt = svgEl('text', {x:padL+w+6, y:y+rowH*0.65, 'font-size':10.5, fill:'#e7eaf2'});
    valTxt.textContent = fmt(it.value);
    svg.appendChild(valTxt);
  });
  container.innerHTML='';
  container.appendChild(svg);
}

function donutChart(container, items, opts={}){
  const W = opts.width || 360, H = opts.height || 220;
  const cx = H/2, cy = H/2, rOuter = H*0.40, rInner = rOuter*0.58;
  const total = items.reduce((a,b)=>a+b.value,0) || 1;
  const svg = svgEl('svg', {viewBox:`0 0 ${W} ${H}`, preserveAspectRatio:'xMinYMid meet'});
  let angle = -Math.PI/2;
  items.forEach(it=>{
    const frac = it.value/total;
    const a0 = angle, a1 = angle + frac*Math.PI*2;
    angle = a1;
    const x0o = cx+rOuter*Math.cos(a0), y0o = cy+rOuter*Math.sin(a0);
    const x1o = cx+rOuter*Math.cos(a1), y1o = cy+rOuter*Math.sin(a1);
    const x0i = cx+rInner*Math.cos(a1), y0i = cy+rInner*Math.sin(a1);
    const x1i = cx+rInner*Math.cos(a0), y1i = cy+rInner*Math.sin(a0);
    const large = (a1-a0) > Math.PI ? 1 : 0;
    const d = `M ${x0o} ${y0o} A ${rOuter} ${rOuter} 0 ${large} 1 ${x1o} ${y1o} L ${x0i} ${y0i} A ${rInner} ${rInner} 0 ${large} 0 ${x1i} ${y1i} Z`;
    const path = svgEl('path', {d, fill:it.color, stroke:'#0b0e14', 'stroke-width':2, style:'cursor:pointer'});
    path.addEventListener('mousemove', (e)=>showTip(e, `<b>${it.label}</b><br>${fmt(it.value)} (${(frac*100).toFixed(1)}%)`));
    path.addEventListener('mouseleave', hideTip);
    svg.appendChild(path);
  });
  const totalTxt = svgEl('text', {x:cx, y:cy-2, 'text-anchor':'middle', 'font-size':14, 'font-weight':700, fill:'#e7eaf2'});
  totalTxt.textContent = fmt(total);
  svg.appendChild(totalTxt);
  const subTxt = svgEl('text', {x:cx, y:cy+13, 'text-anchor':'middle', 'font-size':8});
  subTxt.textContent = 'total';
  svg.appendChild(subTxt);

  const lx = H + 14;
  const rowH = Math.min(18, (H-16)/items.length);
  items.forEach((it,i)=>{
    const ly = 14 + i*rowH;
    if(ly > H-4) return;
    svg.appendChild(svgEl('rect', {x:lx, y:ly-8, width:8, height:8, rx:2, fill:it.color}));
    const frac = ((it.value/total)*100).toFixed(1);
    const t = svgEl('text', {x:lx+13, y:ly, 'font-size':9.5});
    const label = it.label.length>20 ? it.label.slice(0,18)+'…' : it.label;
    t.textContent = `${label} — ${frac}%`;
    svg.appendChild(t);
  });

  container.innerHTML='';
  container.appendChild(svg);
}

function addLegend(container, items){
  const div = document.createElement('div');
  div.className = 'legend';
  div.innerHTML = items.map(it=>`<span><i style="background:${it.color}"></i>${it.label}</span>`).join('');
  container.appendChild(div);
}
